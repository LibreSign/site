# This is a basic workflow to help you get started with Actions

name: Deploy

# Controls when the workflow will run
on:
  # Triggers the workflow on push events but only for the main branch
  push:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
  # Weekly rebuild so GitHub download stats stay reasonably fresh
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 03:00 UTC

jobs:
  # On schedule: fetch the current download floor and compare against the cached
  # value. Only sets should_deploy=true (and commits the new cache) when the
  # floored-to-thousand count has actually increased. On any other trigger,
  # always sets should_deploy=true so the build runs unconditionally.
  check:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if download count increased
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT=$(python3 - <<'PYEOF'
          import os, urllib.request, json, math
          total = 0
          page = 1
          token = os.environ.get("GITHUB_TOKEN", "")
          while True:
              url = f"https://api.github.com/repos/LibreSign/libresign/releases?per_page=100&page={page}"
              headers = {"User-Agent": "libresign-site-build"}
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  releases = json.loads(r.read())
              if not releases:
                  break
              for rel in releases:
                  for a in rel.get("assets", []):
                      total += a.get("download_count", 0)
              if len(releases) < 100:
                  break
              page += 1
          print(int(math.floor(total / 1000)) * 1000)
          PYEOF
          )

          CACHED=$(cat .github/download-count-cache 2>/dev/null || echo 0)
          echo "Current (floored to 1k): $CURRENT | Cached: $CACHED"

          if [ "$CURRENT" = "$CACHED" ]; then
            echo "No increment — skipping deploy."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "Increment detected ($CACHED → $CURRENT) — will deploy."
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            echo "$CURRENT" > .github/download-count-cache
            git add .github/download-count-cache
            git commit -m "chore: update download count cache [skip ci]"
            git push
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Set up php 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
      - name: Set up PHP dependencie
        run: composer i
      - name: Run composer command
        run: composer prod
      - name: Build production site
        run: ./vendor/bin/jigsaw build production
      - name: Deploy to GitHub Pages
        if: success()
        uses: crazy-max/ghaction-github-pages@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          build_dir: build_production
          fqdn: libresign.coop
          jekyll: false
