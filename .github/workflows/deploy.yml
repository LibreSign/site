name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      WC_CONSUMER_KEY: ${{ secrets.WC_CONSUMER_KEY }}
      WC_CONSUMER_SECRET: ${{ secrets.WC_CONSUMER_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
      - run: composer i
      - run: composer prod
      - uses: crazy-max/ghaction-github-pages@v4
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          build_dir: build_production
          fqdn: libresign.coop
          jekyll: false
      - name: Wait for GitHub Pages to serve updated fragments
        if: success()
        run: |
          echo "Waiting for libresign.coop to serve the latest build..."
          BUILT_HASH=$(md5sum build_production/fragments/header/index.html | cut -d' ' -f1)
          echo "Expected MD5: $BUILT_HASH"
          for attempt in $(seq 1 30); do
            LIVE_HASH=$(curl -sf --max-time 15 "https://libresign.coop/fragments/header/" | md5sum | cut -d' ' -f1)
            echo "Attempt $attempt/30: live=$LIVE_HASH expected=$BUILT_HASH"
            if [ "$LIVE_HASH" = "$BUILT_HASH" ]; then
              echo "GitHub Pages is serving the latest content."
              exit 0
            fi
            sleep 10
          done
          echo "Warning: timed out waiting for GitHub Pages update. Fragment sync may use stale content."
          exit 0
