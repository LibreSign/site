name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      WC_CONSUMER_KEY: ${{ secrets.WC_CONSUMER_KEY }}
      WC_CONSUMER_SECRET: ${{ secrets.WC_CONSUMER_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
      - run: composer i
      - run: composer prod
      - uses: crazy-max/ghaction-github-pages@v4
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          build_dir: build_production
          fqdn: libresign.coop
          jekyll: false

      - name: Resolve merged PR context
        id: merged-pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const { data } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: context.sha,
            });

            const mergedPullRequest = data.find((pullRequest) => {
              const baseRepo = pullRequest.base?.repo;

              return Boolean(
                pullRequest.merged_at
                && pullRequest.base?.ref === 'main'
                && baseRepo?.owner?.login === owner
                && baseRepo?.name === repo
              );
            });

            core.setOutput('merged', mergedPullRequest ? 'true' : 'false');
            core.setOutput('pr_number', mergedPullRequest ? String(mergedPullRequest.number) : '');
            core.setOutput('pr_head_ref', mergedPullRequest?.head?.ref ?? '');
            core.setOutput('pr_merged_at', mergedPullRequest?.merged_at ?? '');

      - name: Publish production fragments
        if: steps.merged-pr.outputs.merged == 'true'
        env:
          LIBRESIGN_HEADER_WEBHOOK_URL: ${{ secrets.LIBRESIGN_HEADER_WEBHOOK_URL }}
          LIBRESIGN_HEADER_WEBHOOK_SECRET: ${{ secrets.LIBRESIGN_HEADER_WEBHOOK_SECRET }}
          LIBRESIGN_FOOTER_WEBHOOK_URL: ${{ secrets.LIBRESIGN_FOOTER_WEBHOOK_URL }}
          LIBRESIGN_FOOTER_WEBHOOK_SECRET: ${{ secrets.LIBRESIGN_FOOTER_WEBHOOK_SECRET }}
          LIBRESIGN_MERGED_PR_NUMBER: ${{ steps.merged-pr.outputs.pr_number }}
          LIBRESIGN_MERGED_PR_HEAD_REF: ${{ steps.merged-pr.outputs.pr_head_ref }}
          LIBRESIGN_MERGED_PR_MERGED_AT: ${{ steps.merged-pr.outputs.pr_merged_at }}
        run: php scripts/publish_fragments.php build_production
