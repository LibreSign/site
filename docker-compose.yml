services:

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - 127.0.0.1:${HTTP_PORT:-80}:80
    volumes:
      - .docker/nginx/:/etc/nginx/conf.d/
      - ./build_local:/var/www/html

  php:
    image: ghcr.io/libresign/jigsaw-dev-php:${PHP_IMAGE_TAG:-latest}
    # build:
    #   context: .docker/php
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "127.0.0.1:${HTTP_PORT_BROWSERSYNC:-3000}:3000"
    volumes:
      - .:/var/www/html
      - ${COMPOSER_HOME_DIR:-${HOME}/.composer}:/var/www/.composer/
      - ${NPM_CACHE_DIR:-${HOME}/.npm}:/var/www/.npm/
    working_dir: /var/www/html
    environment:
      - HOME=/var/www/html
      - COMPOSER_HOME=/var/www/.composer
      - NPM_CONFIG_CACHE=/var/www/.npm
      - SERVER_MODE=${SERVER_MODE:-watch}
      - TZ=${TZ:-America/Sao_Paulo}
      - XDEBUG_CONFIG=${XDEBUG_CONFIG:-client_host=172.17.0.1 start_with_request=yes}
      - XDEBUG_MODE=${XDEBUG_MODE:-debug}
      - APP_ENV=${APP_ENV:-develop}
      - ASSIGNED_USER_ID=${ASSIGNED_USER_ID:-123}
      - CAMPAIGN_ID=${CAMPAIGN_ID:-123}
      - URL_SUITECRM=${URL_SUITECRM:-123}
      - URL_SITE=${URL_SITE:-http://localhost}
      - WC_CONSUMER_KEY=${WC_CONSUMER_KEY:-}
      - WC_CONSUMER_SECRET=${WC_CONSUMER_SECRET:-}
